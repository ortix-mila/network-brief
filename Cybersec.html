const T1_1=`<h4>What Is a Network — And Why Should You Care?</h4>
<p>At its most basic, a <strong>network</strong> is two or more devices connected together to share information. That's it. When your phone connects to your home Wi-Fi and can browse the internet, print to a wireless printer, or cast a video to your TV — all of that happens because those devices are on the same network.</p>

<p>But networks aren't just about convenience. <strong>Everything in modern civilization depends on networks:</strong></p>
<ul>
<li>Hospitals store patient records, control medical equipment, and coordinate care over networks</li>
<li>Banks process millions of transactions per second across global networks</li>
<li>Governments run elections, military communications, and intelligence on classified networks</li>
<li>Courts file motions, store evidence, and communicate between jurisdictions over networks</li>
<li>Power grids, water treatment plants, and traffic systems are all network-controlled</li>
</ul>

<p>This is why cybersecurity matters. When we say "protecting networks," we're not just protecting computers — we're protecting everything that <em>depends</em> on those computers.</p>

<h4>Your Home Network — What's Actually Happening Right Now</h4>
<p>Let's look at what's in your house right now. You probably have:</p>
<ul>
<li>A <strong>modem</strong> — connects to your ISP (Internet Service Provider) through a phone line, cable, or fiber optic cable. This is your connection to the outside world.</li>
<li>A <strong>router</strong> — creates your private local network. Most home routers also have a built-in Wi-Fi access point. The router assigns IP addresses to your devices, manages traffic, and acts as a security boundary between your home and the internet.</li>
<li>A <strong>Wi-Fi access point</strong> — broadcasts a wireless signal. In most homes, this is built into the router. It uses radio waves (typically 2.4 GHz or 5 GHz frequency bands) to connect devices wirelessly.</li>
<li><strong>Ethernet cables</strong> — wired connections, faster and more reliable than Wi-Fi. Desktop computers, gaming consoles, and smart TVs often use these.</li>
<li><strong>Devices</strong> — phones, laptops, tablets, smart TVs, security cameras, smart speakers, printers, gaming consoles, even smart refrigerators and light bulbs.</li>
</ul>

<p>All of these devices together form your <strong>Local Area Network (LAN)</strong>. Your LAN is <em>private</em> — devices on it can see and talk to each other, but people on the internet cannot directly reach your devices. Your router acts as a gatekeeper, deciding what traffic is allowed in and out.</p>

<div class="lab">
<div class="lab-h"><div class="lab-dots"><span></span><span></span><span></span></div>Lab: Visualizing Your Home Network</div>

<div class="bx an"><div class="bl">⚖️ Legal Analogy — Your Home Network</div>Think of your home network as a <strong>private law firm</strong>. Inside the building, everyone can access shared resources — the printer, the conference room, the file server. The router is the <strong>reception desk and security checkpoint</strong>. It decides who from outside can enter (incoming traffic) and handles outgoing communications (outgoing traffic). Nobody on the street can walk in without going through reception first. The <strong>firewall</strong> built into your router is like the security policy — it has rules about what's allowed in and what gets rejected.</div>

<h4>Types of Networks — From Personal to Planetary</h4>
<p>Networks come in different sizes, each designed for a different scope:</p>

<table>
<tr><th>Type</th><th>Full Name</th><th>Scope</th><th>Example</th><th>Typical Speed</th></tr>
<tr><td><strong>PAN</strong></td><td>Personal Area Network</td><td>Within arm's reach (~1-10m)</td><td>Bluetooth headphones ↔ phone, smartwatch ↔ phone</td><td>1-3 Mbps</td></tr>
<tr><td><strong>LAN</strong></td><td>Local Area Network</td><td>One building or campus</td><td>Home Wi-Fi, office network, school computer lab</td><td>100Mbps-10Gbps</td></tr>
<tr><td><strong>WLAN</strong></td><td>Wireless LAN</td><td>Same as LAN, but wireless</td><td>Wi-Fi specifically (802.11 standard)</td><td>Up to 9.6 Gbps (Wi-Fi 6)</td></tr>
<tr><td><strong>MAN</strong></td><td>Metropolitan Area Network</td><td>A city or metro area</td><td>City government network connecting all departments</td><td>Variable</td></tr>
<tr><td><strong>WAN</strong></td><td>Wide Area Network</td><td>Countries/continents</td><td>The internet itself; corporate networks spanning offices worldwide</td><td>Variable</td></tr>
<tr><td><strong>VPN</strong></td><td>Virtual Private Network</td><td>Logical tunnel over any network</td><td>Remote worker connecting securely to the office</td><td>Depends on underlying connection</td></tr>
<tr><td><strong>SAN</strong></td><td>Storage Area Network</td><td>Data center storage</td><td>High-speed network connecting servers to storage arrays</td><td>16-128 Gbps</td></tr>
</table>

<h4>The Internet — A Network of Networks</h4>
<p>The internet is not one single network. It's <strong>millions of interconnected networks</strong> — your home LAN connects to your ISP's network, which connects to regional networks, which connect to backbone networks operated by companies like Lumen (formerly CenturyLink), Cogent, and Hurricane Electric. These backbone networks are connected through <strong>Internet Exchange Points (IXPs)</strong> — physical buildings where networks meet and exchange traffic.</p>

<p>Fundamentally, the internet is <strong>physical infrastructure</strong>:</p>
<ul>
<li><strong>Undersea cables</strong> — over 550 active submarine cables totaling 1.3+ million km carry 95% of intercontinental data. These are fiber optic cables on the ocean floor, some as thin as a garden hose.</li>
<li><strong>Data centers</strong> — massive buildings filled with thousands of servers. Companies like Google, Amazon, and Microsoft operate data centers on every continent (except Antarctica).</li>
<li><strong>Cell towers</strong> — for mobile internet (4G/5G)</li>
<li><strong>Satellite links</strong> — for remote areas (e.g., Starlink)</li>
</ul>

<div class="bx sc"><div class="bl">📰 Real-World Case: Submarine Cable Sabotage</div>In January 2022, an undersea cable connecting Norway to Svalbard was mysteriously severed, cutting off satellite communication for a research station. In October 2022, the Nord Stream gas pipeline sabotage also damaged nearby submarine cables in the Baltic Sea. In February 2024, three submarine cables in the Red Sea were cut — reportedly by a Houthi-anchored ship — disrupting 25% of internet traffic between Asia and Europe.<br><br>These incidents highlight a critical vulnerability: the global internet depends on a relatively small number of physical cables. A single cable cut can disrupt connectivity for millions of people. Some military and intelligence operations specifically target submarine cables for surveillance (see: NSA's Operation Ivy Bells during the Cold War).</div>

<div class="bx tp"><div class="bl">💡 Key Concept: The Internet Is Physical</div>There is no "cloud." When someone says your data is "in the cloud," it's actually sitting on a hard drive in a specific building, in a specific city, connected by specific cables. "The cloud" is just someone else's computer. Understanding this physical reality is essential for understanding cybersecurity — because physical access to infrastructure = potential compromise.</div>

<h4>Network Topologies — How Devices Are Arranged</h4>
<p>A <strong>topology</strong> describes how devices are connected to each other. This affects performance, reliability, and cost:</p>

<table>
<tr><th>Topology</th><th>How It Works</th><th>Pros</th><th>Cons</th><th>Used Where</th></tr>
<tr><td><strong>Star ⭐</strong></td><td>All devices connect to a central switch/router</td><td>Easy to manage; one device failure doesn't affect others</td><td>Central device is a single point of failure</td><td>Most modern networks (homes, offices)</td></tr>
<tr><td><strong>Bus 🚌</strong></td><td>All devices share one single cable (backbone)</td><td>Cheap, simple to set up</td><td>One cable break = entire network down; collisions</td><td>Old Ethernet networks (obsolete)</td></tr>
<tr><td><strong>Ring 🔄</strong></td><td>Each device connects to exactly two neighbors, forming a loop</td><td>Equal access; predictable performance</td><td>One break = network down (unless dual-ring)</td><td>Token Ring (legacy); some fiber backbones</td></tr>
<tr><td><strong>Mesh 🕸️</strong></td><td>Every device connects to every other device</td><td>Maximum redundancy; no single point of failure</td><td>Expensive; complex wiring</td><td>Military; critical infrastructure; mesh Wi-Fi</td></tr>
<tr><td><strong>Hybrid</strong></td><td>Combination of topologies</td><td>Flexible; tailored to needs</td><td>Complex to design and maintain</td><td>Most large enterprise networks</td></tr>
</table>

<div class="bx an"><div class="bl">⚖️ Analogy — Topologies as Court Systems</div>
<strong>Star</strong> = A courthouse with a central clerk. All filings go through one clerk. If the clerk is sick, nothing moves. But one lawyer being absent doesn't stop others.<br><br>
<strong>Bus</strong> = A single hallway where everyone shouts their business. If the hallway is blocked, nobody can communicate. Everyone hears everyone (collision risk).<br><br>
<strong>Ring</strong> = A round table where you can only pass documents to the person next to you. Orderly, but if one person leaves, the chain breaks.<br><br>
<strong>Mesh</strong> = Every lawyer has a direct phone line to every other lawyer. Expensive, but if one line goes down, there are many alternatives. Used when communication must never fail.
</div>

{t:"How Data Travels — Packets & Routing",c:`<h4>Breaking Data Into Packets</h4>
<p>When you click a link or send a message, your device doesn't send the entire request as one continuous stream. It breaks the data into small pieces called <strong>packets</strong> — typically 1,500 bytes each (called the <strong>MTU — Maximum Transmission Unit</strong>).</p>

<p>Why? Imagine sending a 500-page legal brief from Juba to Nairobi. You have two approaches:</p>

<p><strong>Option A: Circuit Switching (the old telephone way)</strong><br>
Reserve an entire dedicated line from Juba to Nairobi for the duration of your conversation. Nobody else can use that line while you're on it. If the line breaks, you lose everything and start over. This is how old telephone networks worked — an actual electrical circuit was established end-to-end.</p>

<p><strong>Option B: Packet Switching (how the internet works)</strong><br>
Break the brief into 50 numbered envelopes of 10 pages each. Send each envelope individually — they can take different routes, share the road with other people's envelopes, and arrive in any order. The receiving side reassembles them by number. If envelope #14 gets lost, only #14 needs to be resent. Multiple conversations share the same infrastructure simultaneously.</p>

<p>The internet uses <strong>Option B — packet switching</strong>. This is the fundamental design decision that makes the internet scalable, resilient, and efficient.</p>

<h4>Anatomy of a Packet</h4>
<pre>
┌───────────────────────────────────────────────────┐
│                    IP PACKET                      │
├───────────────────┬───────────────────────────────┤
│     IP HEADER     │          PAYLOAD              │
│   (20-60 bytes)   │    (the actual data)          │
│                   │                               │
│ Version: IPv4     │  This could be:               │
│ Header Length: 20 │  • Part of a web page          │
│ Total Length: 1500│  • A chunk of an email          │
│ TTL: 64           │  • A piece of a file download   │
│ Protocol: TCP (6) │  • A DNS query                  │
│ Src: 192.168.1.88 │  • Part of a video stream       │
│ Dst: 93.184.216.34│                               │
│ Checksum: 0xA3F2  │  (up to ~1480 bytes)          │
└───────────────────┴───────────────────────────────┘

Key Header Fields:
• Source IP — who sent this packet
• Destination IP — where it's going
• TTL (Time To Live) — max number of router hops before packet is discarded (prevents infinite loops)
• Protocol — what's inside (6=TCP, 17=UDP, 1=ICMP)
• Checksum — math check to detect corruption during transit
</pre>

<h4>The Journey of a Packet — Step by Step</h4>
<p>Let's trace what happens when you type <code>https://www.google.com</code> and press Enter:</p>

<ol>
<li><strong>DNS Resolution:</strong> Your browser asks "What's the IP address for google.com?" → DNS returns <code>142.250.80.46</code></li>
<li><strong>TCP Handshake:</strong> Your computer establishes a TCP connection with Google's server (SYN → SYN-ACK → ACK)</li>
<li><strong>TLS Handshake:</strong> Encryption is negotiated (because HTTPS). Your browser and the server agree on encryption keys.</li>
<li><strong>HTTP Request:</strong> Your browser sends an HTTP GET request for the homepage</li>
<li><strong>Packetization:</strong> The request is broken into packets, each with source IP (you), destination IP (Google), and a sequence number</li>
<li><strong>Local Delivery:</strong> Packets go to your router (Layer 2, using your router's MAC address)</li>
<li><strong>NAT:</strong> Your router replaces your private IP (192.168.1.88) with your public IP (203.0.113.50) and forwards to your ISP</li>
<li><strong>Routing:</strong> Each router along the path reads the destination IP and forwards the packet toward Google — this may involve 5-30 router hops across multiple ISPs and countries</li>
<li><strong>Google Receives:</strong> Google's server reassembles all packets, processes the request, and generates a response (the HTML page)</li>
<li><strong>Response Packets:</strong> Google sends response packets back — they may take a completely different route!</li>
<li><strong>Reassembly:</strong> Your browser reassembles the packets into the complete webpage and renders it</li>
</ol>

<p>This entire process — from pressing Enter to seeing the page — typically takes <strong>50-200 milliseconds</strong>.</p>

<div class="lab">
<div class="lab-h"><div class="lab-dots"><span></span><span></span><span></span></div>Lab: Tracing a Packet's Route</div>

64 bytes from 142.250.80.46: icmp_seq=2 ttl=116 time=22.8 ms

--- google.com ping statistics ---
4 packets transmitted, 4 received, 0% packet loss
round-trip min/avg/max = 22.8/23.5/24.1 ms
</div><br>
<div class="cm">// ping sends ICMP Echo Request packets and waits for replies</div>
<div class="cm">// ttl=116 means the packet started with TTL 128 and passed through 12 routers (128-116=12)</div>
<div class="cm">// time=23.4ms is the round-trip latency</div>
<div class="cm">// 0% packet loss = perfect connection</div>
<div class="cm">// High packet loss or * = network problems or host is blocking ICMP</div>
<div class="cm">//</div>
<div class="cm">// USEFUL VARIATIONS:</div>
<div class="cm">// ping -c 10 google.com    ← send exactly 10 pings</div>
<div class="cm">// ping -t google.com       ← continuous (Windows)</div>
<div class="cm">// ping 192.168.1.1         ← ping your router (test local connection)</div>
</div>
</div>

<h4>Key Networking Terminology</h4>
<table>
<tr><th>Term</th><th>Meaning</th><th>Analogy</th><th>Measured In</th></tr>
<tr><td><strong>Bandwidth</strong></td><td>Maximum data transfer rate of a connection</td><td>Width of the highway — how many lanes</td><td>Mbps, Gbps</td></tr>
<tr><td><strong>Latency</strong></td><td>Time for a single packet to travel from A to B</td><td>Length of the highway — how far the trip</td><td>Milliseconds (ms)</td></tr>
<tr><td><strong>Throughput</strong></td><td>Actual achieved data rate (always less than bandwidth)</td><td>Actual cars passing per hour (factoring in traffic, accidents)</td><td>Mbps</td></tr>
<tr><td><strong>Hop</strong></td><td>Each router a packet passes through</td><td>Each checkpoint along the delivery route</td><td>Count</td></tr>
<tr><td><strong>TTL</strong></td><td>Time To Live — max hops before packet is discarded</td><td>Package expires after X days in transit</td><td>Hop count (0-255)</td></tr>
<tr><td><strong>Packet Loss</strong></td><td>Percentage of packets that don't arrive</td><td>Percentage of mail lost in transit</td><td>Percentage (%)</td></tr>
<tr><td><strong>Jitter</strong></td><td>Variation in latency between packets</td><td>Some trips take 10 min, others 30 min — unpredictable</td><td>Milliseconds (ms)</td></tr>
<tr><td><strong>MTU</strong></td><td>Maximum Transmission Unit — max packet size</td><td>Maximum envelope size the postal service accepts</td><td>Bytes (typically 1500)</td></tr>
</table>

<div class="bx an"><div class="bl">⚖️ Legal Analogy — Bandwidth vs Latency</div>Imagine two courthouses processing cases.<br><br><strong>Courthouse A</strong> has 10 clerks (high bandwidth) but is 500 miles away (high latency). It can handle many cases simultaneously, but each one takes time to arrive.<br><br><strong>Courthouse B</strong> has 2 clerks (low bandwidth) but is next door (low latency). Each case gets there instantly, but only 2 can be processed at once.<br><br>For a simple question ("is this case active?"), Courthouse B is faster despite lower bandwidth. For a massive document transfer, Courthouse A wins despite higher latency. Different tasks need different priorities — just like video calls need low latency (UDP) while file downloads need high throughput (TCP).</div>

<div class="bx sc"><div class="bl">📰 Real World — When Packet Loss Matters</div>In October 2021, Facebook (Meta) experienced a 6-hour global outage affecting Facebook, Instagram, WhatsApp, and Oculus. The root cause was a BGP routing update that accidentally withdrew all of Facebook's routes from the global routing table. Since their DNS servers were also unreachable, the domain facebook.com simply stopped resolving. Effectively, Facebook's packets had nowhere to go — 100% packet loss to every Facebook service worldwide. Cost: estimated $60 million in lost revenue plus untold productivity losses for the 3+ billion users who rely on Meta's platforms.</div>`,qs:[

{t:"IP Addressing — Your Network Identity",c:`<h4>Every Device Needs an Address</h4>
<p>For devices to communicate, each needs a unique identifier — like a mailing address for mail delivery. In networking, this is the <strong>IP (Internet Protocol) address</strong>.</p>

<h4>IPv4 — The Address Format You'll See Most</h4>
<p>IPv4 addresses consist of four numbers (0-255) separated by dots. Each number is called an <strong>octet</strong> (8 bits):</p>
<pre>
192.168.1.88

Each octet in binary:
  192    →  11000000   (128+64 = 192)
  168    →  10101000   (128+32+8 = 168)
    1    →  00000001   (1)
   88    →  01011000   (64+16+8 = 88)

Total: 4 octets × 8 bits = 32 bits
Possible addresses: 2^32 = 4,294,967,296 (~4.3 billion)

But with 20+ billion connected devices... we ran out!
</pre>

<h4>Public vs Private IP Addresses</h4>
<p>The solution to running out of IPs: <strong>NAT (Network Address Translation)</strong>. Your ISP gives your household <strong>one</strong> public IP. Your router creates private IPs for all internal devices.</p>

<table>
<tr><th></th><th>Public IP</th><th>Private IP</th></tr>
<tr><td><strong>Visible to</strong></td><td>The entire internet</td><td>Only your local network</td></tr>
<tr><td><strong>Assigned by</strong></td><td>Your ISP</td><td>Your router (via DHCP)</td></tr>
<tr><td><strong>Globally unique?</strong></td><td>Yes — no two devices share a public IP</td><td>No — millions of homes use 192.168.1.x</td></tr>
<tr><td><strong>Example</strong></td><td>203.0.113.50</td><td>192.168.1.88</td></tr>
</table>

<h5>Private IP Ranges (memorize these!)</h5>
<table>
<tr><th>Range</th><th>Class</th><th>Total Addresses</th><th>Common Use</th></tr>
<tr><td><code>10.0.0.0 — 10.255.255.255</code></td><td>A</td><td>16.7 million</td><td>Large corporate networks</td></tr>
<tr><td><code>172.16.0.0 — 172.31.255.255</code></td><td>B</td><td>1 million</td><td>Medium organizations</td></tr>
<tr><td><code>192.168.0.0 — 192.168.255.255</code></td><td>C</td><td>65,536</td><td>Home networks, small offices</td></tr>
</table>

<div class="bx tp"><div class="bl">💡 Quick Recognition</div>If an IP starts with <strong>10.</strong>, <strong>172.16-31.</strong>, or <strong>192.168.</strong> — it's a private IP. Everything else is public (with some exceptions like 127.0.0.1 for localhost).</div>

<h4>NAT — How Your Router Translates Addresses</h4>
<pre>
INSIDE YOUR HOME:                    THE INTERNET:

Phone (192.168.1.5) ────┐
                        │
Laptop (192.168.1.88) ──┤──→ ROUTER ──→ All appear as 203.0.113.50
                        │    (NAT)
TV (192.168.1.20) ──────┘

The router maintains a NAT TABLE:
┌─────────────┬───────┬──────────────────┬───────┐
│ Internal IP  │ Port  │ External IP      │ Port  │
├─────────────┼───────┼──────────────────┼───────┤
│ 192.168.1.5  │ 52481 │ 203.0.113.50     │ 52481 │
│ 192.168.1.88 │ 49320 │ 203.0.113.50     │ 49320 │
│ 192.168.1.20 │ 60012 │ 203.0.113.50     │ 60012 │
└─────────────┴───────┴──────────────────┴───────┘

When a response comes back, the router checks its table
and forwards to the correct internal device.
</pre>

<h4>DHCP — Automatic Address Assignment</h4>
<p>When you connect to a network, you don't manually type an IP. <strong>DHCP</strong> handles it automatically in 4 steps (remember: <strong>DORA</strong>):</p>
<ol>
<li><strong>D</strong>iscover — Your device broadcasts: "Any DHCP server out there?"</li>
<li><strong>O</strong>ffer — Router responds: "I can offer you 192.168.1.88"</li>
<li><strong>R</strong>equest — Your device: "I'll take 192.168.1.88 please"</li>
<li><strong>A</strong>cknowledge — Router: "Confirmed. It's yours for 24 hours (lease time)"</li>
</ol>

<h4>MAC Addresses — Permanent Hardware Identity</h4>
<p>While IP addresses are <em>logical</em> (assigned by software), every network card has a permanent <strong>MAC address</strong> burned in at manufacturing:</p>
<pre>
A4:5E:60:B8:3C:12

<div class="bx sc"><div class="bl">📰 Forensic Investigation Scenario</div>A company discovers unauthorized access to their financial database at 2:37 AM. The investigation process:<br><br>
1. <strong>Firewall logs</strong> show the access came from public IP <code>41.76.234.15</code><br>
2. <strong>ISP records</strong> (obtained with a court order) trace that IP to a specific household<br>
3. <strong>Router logs</strong> at that household show private IP <code>192.168.1.12</code> was active at 2:37 AM<br>
4. <strong>DHCP logs</strong> show <code>192.168.1.12</code> was leased to MAC <code>A4:5E:60:B8:3C:12</code><br>
5. <strong>OUI lookup</strong> reveals <code>A4:5E:60</code> = Apple Inc. → It's an iPhone<br>
6. The suspect's iPhone is seized; its MAC matches<br>
7. <strong>Browser history and app data</strong> on the phone confirm the access<br><br>
This chain — public IP → ISP → household → private IP → MAC → physical device → device forensics — is how digital investigations work. Each link must be documented for <strong>chain of custody</strong>.</div>`,qs:[
